<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento · SlideCraft</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .payment-radio:checked + label { border-color: #D4AF37; background: rgba(212,175,55,0.05); }
  </style>
</head>
<body class="bg-[#0a0a0a] min-h-screen flex flex-col">
  <div id="navbar-container"></div>
  <main class="flex-1 flex items-center justify-center p-4">
    <div class="glass rounded-3xl p-8 w-full max-w-md animate-in">
      <h2 class="text-2xl font-bold mb-2">Finalizar Pagamento</h2>
      <p class="text-white/50 mb-6">Pedido <span id="orderIdDisplay" class="text-amber-400 font-mono"></span></p>

      <!-- Valor -->
      <div class="glass bg-white/5 rounded-2xl p-5 mb-6 flex justify-between items-center">
        <span class="text-white/70">Valor total</span>
        <span id="totalValue" class="text-3xl font-bold text-amber-400"></span>
      </div>

      <!-- Tipo de pagamento -->
      <div class="space-y-3 mb-6">
        <label class="flex items-center gap-4 glass bg-white/5 rounded-2xl p-4 cursor-pointer payment-radio-label">
          <input type="radio" name="paymentType" value="full" checked class="hidden payment-radio">
          <div class="w-5 h-5 rounded-full border-2 border-white/30 flex items-center justify-center">
            <div class="w-3 h-3 rounded-full bg-amber-400 hidden inner-dot"></div>
          </div>
          <div>
            <div class="font-medium">Pagar 100% agora</div>
            <div class="text-sm text-white/50">Pagamento integral</div>
          </div>
        </label>
        <label class="flex items-center gap-4 glass bg-white/5 rounded-2xl p-4 cursor-pointer payment-radio-label">
          <input type="radio" name="paymentType" value="50" class="hidden payment-radio">
          <div class="w-5 h-5 rounded-full border-2 border-white/30 flex items-center justify-center">
            <div class="w-3 h-3 rounded-full bg-amber-400 hidden inner-dot"></div>
          </div>
          <div>
            <div class="font-medium">Pagar 50% agora</div>
            <div class="text-sm text-white/50">Entrada de <span id="halfValue" class="text-amber-400"></span></div>
          </div>
        </label>
      </div>

      <!-- Telefone M-Pesa -->
      <input type="text" id="phoneNumber" placeholder="Nº M-Pesa (ex: 84XXXXXXXXX)" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white outline-none focus:border-amber-400 transition mb-4">

      <button id="payButton" class="w-full bg-amber-400 text-black py-4 rounded-2xl font-semibold hover:bg-amber-500 transition">
        Pagar com M-Pesa
      </button>
      <p class="text-xs text-white/30 text-center mt-4">Pagamento processado via M-Pesa. Seguro e instantâneo.</p>
    </div>
  </main>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/navbar.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Redirecionando...');

    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('orderId');
    const valor = Number(params.get('valor'));

    document.getElementById('orderIdDisplay').textContent = orderId;
    document.getElementById('totalValue').textContent = valor.toLocaleString() + ' MZN';
    document.getElementById('halfValue').textContent = Math.round(valor * 0.5).toLocaleString() + ' MZN';

    // Radio styling
    const radios = document.querySelectorAll('.payment-radio');
    radios.forEach(radio => {
      radio.addEventListener('change', () => {
        document.querySelectorAll('.inner-dot').forEach(dot => dot.classList.add('hidden'));
        const label = radio.closest('.payment-radio-label');
        label.querySelector('.inner-dot').classList.remove('hidden');
      });
    });

    document.getElementById('payButton').addEventListener('click', async () => {
      const phone = document.getElementById('phoneNumber').value;
      if (!phone) return alert('Insira o número de telefone');
      const paymentType = document.querySelector('input[name="paymentType"]:checked').value;
      let amount = paymentType === '50' ? Math.round(valor * 0.5) : valor;

      try {
        const res = await fetch('http://localhost:3000/api/payment/initiate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${getToken()}`
          },
          body: JSON.stringify({ orderId, phone, amount, paymentType })
        });
        const data = await res.json();
        if (data.success) {
          alert('Pedido de pagamento enviado. Verifique seu telefone.');
          // Simula callback para testes
          setTimeout(() => {
            fetch('http://localhost:3000/api/payment/callback', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ orderId, status: 'success' })
            }).then(() => {
              window.location.href = `success.html?orderId=${orderId}`;
            });
          }, 3000);
        } else {
          alert('Falha ao iniciar pagamento');
        }
      } catch (err) {
        alert('Erro de conexão');
      }
    });
  </script>
</body>
</html>
